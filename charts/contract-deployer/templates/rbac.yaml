{{- if or (eq .Values.mode "deployment") (eq .Values.mode "job") }}
# Role for creating/updating ConfigMaps
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "contract-deployer.fullname" . }}
  labels:
    {{- include "contract-deployer.labels" . | nindent 4 }}
rules:
  # Allow creating and updating ConfigMaps for contract addresses
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "patch", "get", "list"]
---
# RoleBinding to associate ServiceAccount with Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "contract-deployer.fullname" . }}
  labels:
    {{- include "contract-deployer.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "contract-deployer.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "contract-deployer.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
