{{- if eq .Values.mode "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contract-deployer.fullname" . }}
  labels:
    {{- include "contract-deployer.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "contract-deployer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "contract-deployer.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "contract-deployer.fullname" . }}
      containers:
        - name: deployer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "contract-deployer.env" . | nindent 12 }}
            # API 服务配置 (仅 Deployment 模式)
            - name: API_PORT
              value: {{ .Values.api.port | default 3001 | quote }}
          {{- if .Values.api.enabled }}
          ports:
            - name: api
              containerPort: {{ .Values.api.port | default 3001 }}
              protocol: TCP
          {{- end }}
          {{- if and .Values.api.enabled .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds | default 60 }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: {{ .Values.healthCheck.readyInitialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold | default 3 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
