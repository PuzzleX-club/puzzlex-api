{{- if .Values.contractDeployer.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "anvil-testnet.fullname" . }}-deployer
  labels:
    {{- include "anvil-testnet.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Anvil 标准测试私钥 (仅用于测试环境，勿用于生产)
  # Account #0: 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
  deployer-private-key: {{ .Values.anvil.privateKey | quote }}
  # Monad owner 私钥 (用于部署 AllowedZoneManager，与硬编码地址匹配)
  # Account: 0x274A03acfE9F4fE4C16a7310D820670B21C545F7
  monad-owner-private-key: "0x03fdb5ed97f8973bf36a64a241f4b7e1c51e40191f2ba5b75f1c4d14841ef62d"
