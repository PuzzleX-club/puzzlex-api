apiVersion: v1
kind: Service
metadata:
  name: {{ include "anvil-testnet.fullname" . }}
  labels:
    {{- include "anvil-testnet.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: rpc
  selector:
    {{- include "anvil-testnet.selectorLabels" . | nindent 4 }}
