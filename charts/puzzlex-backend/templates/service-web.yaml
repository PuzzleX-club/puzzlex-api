{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "puzzlex-backend.component.fullname" (dict "component" "web" "Values" .Values "Release" .Release "Chart" .Chart) }}
  labels:
    {{- include "puzzlex-backend.component.labels" (dict "component" "web" "Values" .Values "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.web.service.nodePort }}
      nodePort: {{ .Values.web.service.nodePort }}
      {{- end }}
  selector:
    {{- include "puzzlex-backend.component.selectorLabels" (dict "component" "web" "Values" .Values "Release" .Release "Chart" .Chart) | nindent 4 }}
{{- end }}

