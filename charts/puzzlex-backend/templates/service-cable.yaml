{{- if .Values.cable.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "puzzlex-backend.component.fullname" (dict "component" "cable" "Values" .Values "Release" .Release "Chart" .Chart) }}
  labels:
    {{- include "puzzlex-backend.component.labels" (dict "component" "cable" "Values" .Values "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: {{ .Values.cable.service.type }}
  ports:
    - port: {{ .Values.cable.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  # Cable Service selector：
  # - 如果 createDeployment=false：指向 web Deployment（Cable 已集成在 web 中）
  # - 如果 createDeployment=true：指向独立的 cable Deployment
  selector:
    {{- if .Values.cable.createDeployment }}
    {{- include "puzzlex-backend.component.selectorLabels" (dict "component" "cable" "Values" .Values "Release" .Release "Chart" .Chart) | nindent 4 }}
    {{- else }}
    {{- include "puzzlex-backend.component.selectorLabels" (dict "component" "web" "Values" .Values "Release" .Release "Chart" .Chart) | nindent 4 }}
    {{- end }}
{{- end }}

