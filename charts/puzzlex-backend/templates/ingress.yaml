{{- $fullName := include "puzzlex-backend.fullname" . -}}
{{- $webServiceName := include "puzzlex-backend.component.fullname" (dict "component" "web" "Values" .Values "Release" .Release "Chart" .Chart) -}}
{{- $cableServiceName := include "puzzlex-backend.component.fullname" (dict "component" "cable" "Values" .Values "Release" .Release "Chart" .Chart) -}}
{{- $webServicePort := .Values.web.service.port -}}
{{- $cableServicePort := .Values.cable.service.port -}}

{{- if .Values.web.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-api
  labels:
    {{- include "puzzlex-backend.labels" . | nindent 4 }}
  {{- with .Values.web.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    # WebSocket 支持注解 - 使用标准方式
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
  {{- end }}
spec:
  ingressClassName: {{ .Values.web.ingress.className }}
  tls:
    {{- range .Values.web.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  rules:
    {{- range $host := .Values.web.ingress.hosts }}
    - host: {{ $host.host | quote }}
      http:
        paths:
          {{- range $path := $host.paths }}
          - path: {{ $path.path }}
            pathType: {{ $path.pathType }}
            backend:
              service:
                name: {{ $webServiceName }}
                port:
                  number: {{ $webServicePort }}
          {{- end }}
          # WebSocket 路径 - 注意 Nginx 会自动处理 Upgrade 头
          - path: /cable
            pathType: Prefix
            backend:
              service:
                name: {{ $cableServiceName }}
                port:
                  number: {{ $cableServicePort }}
    {{- end }}
{{- end }}
