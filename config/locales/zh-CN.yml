zh-CN:
  time:
    formats:
      long: "%Y年%m月%d日 %H:%M:%S"         # 长格式，包含年、月、日、小时和分钟
      short: "%m月%d日 %H:%M"           # 短格式，不包含年
      only_date: "%Y年%m月%d日"         # 只显示日期
      only_time: "%H:%M"               # 只显示时间
      full: "%Y年%m月%d日 %A %H:%M"     # 完整格式，包含星期
      concise: "%y/%m/%d %H:%M"        # 简洁格式，使用斜线分隔日期
      default: "%Y年%m月%d日 %H:%M"     # 默认格式
    date:
      formats:
        default: "%Y年%m月%d日"           # 默认日期格式
        short: "%m/%d"                   # 短日期格式
        long: "%Y年%m月%d日"              # 长日期格式
        iso8601: "%Y-%m-%dT%H:%M:%S%z"   # ISO 8601 格式
